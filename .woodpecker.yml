# .woodpecker.yml
# Ezt a fájlt a tanuló a React projekt gyökerébe teszi.
# Push után Woodpecker automatikusan buildel és deployol.

steps:
  build:
    image: node:22-alpine
    commands:
      - npm ci
      - npm run build

  deploy:
    image: alpine
    commands:
      - apk add --no-cache curl
      - |
        tar -cz -C dist . | curl -f -X POST "http://deploy-api:3000/deploy/$CI_REPO_OWNER" \
          -H "x-deploy-secret: $DEPLOY_SECRET" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @-
    environment:
      DEPLOY_SECRET:
        from_secret: deploy_secret
    when:
      event: [push, manual]
      branch: main