# .woodpecker.yml

when:
  event: [push, manual]
  branch: main

workspace:
  base: /workspace
  path: repo

steps:
  build:
    image: node:22-alpine
    commands:
      - npm ci
      - VITE_BASE_PATH=frontend/$CI_REPO_OWNER npm run build

  deploy:
    image: alpine
    environment:
      DEPLOY_SECRET:
        from_secret: deploy_secret
    commands:
      - apk add --no-cache curl tar
      - |
        tar -cz -C dist . | curl -f -X POST "http://deploy-api:3000/deploy/$CI_REPO_OWNER" \
          -H "x-deploy-secret: $DEPLOY_SECRET" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @-