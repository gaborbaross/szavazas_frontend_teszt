# .woodpecker.yml

when:
  event: [push, manual]
  branch: main

steps:
  build:
    image: node:22-alpine
    commands:
      - npm ci
      - VITE_BASE_PATH=frontend/$CI_REPO_OWNER npm run build

  deploy:
    image: alpine
    secrets: [DEPLOY_TOKEN]
    commands:
      - apk add --no-cache curl tar
      - tar -czf dist.tar.gz dist/
      - curl -X POST https://deploy.iskola.hu/deploy \
          -H "Authorization: Bearer $DEPLOY_TOKEN" \
          -F "owner=$CI_REPO_OWNER" \
          -F "file=@dist.tar.gz"
