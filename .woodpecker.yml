# .woodpecker.yml
# Ezt a fájlt a tanuló a React projekt gyökerébe teszi.
# Push után a Woodpecker automatikusan buildel és deployol.
# Az elején vár 30 mp-et, hogy az auto-trust script elvégezze a módosítást a repo-n
# CI_REPO_OWNER = a tanuló GitHub felhasználóneve

when:
  event: [push, manual]
  branch: main

steps:
  - name: first-run-wait
    image: alpine
    commands:
      - apk add --no-cache curl jq
      - |
        PIPELINE_COUNT=$(curl -s "https://woodcicd.dszcbaross.edu.hu/api/repos/$CI_REPO_ID/pipelines" \
          -H "Authorization: Bearer $CI_SYSTEM_OAUTH_TOKEN" \
          | jq 'length')
        echo "Pipeline count: $PIPELINE_COUNT"
        if [ "$PIPELINE_COUNT" -le 1 ]; then
          echo "Első build, várakozás 30 másodpercet..."
          sleep 30
        fi

  - name: build
    image: node:22-alpine
    commands:
      - npm ci
      - VITE_BASE_PATH=frontend/$CI_REPO_OWNER npm run build

  - name: deploy
    image: alpine
    volumes:
      - /opt/dest_html:/var/www/pages
    commands:      
      - mkdir -p /var/www/pages/$CI_REPO_OWNER
      - rm -rf /var/www/pages/$CI_REPO_OWNER/*
      - cp -r dist/. /var/www/pages/$CI_REPO_OWNER/
